<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categorias</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" href="../img/favicon.ico" sizes="any" />
  </head>

  <body>
    <nav class="navbar">
      <ul>
        <li><a href="home.html">Ínicio</a></li>
        <li><a href="cadastrodeclientes.html">Clientes</a></li>
        <li><a class="ativo" href="cadastrodecategorias.html">Categorias</a></li>
        <li><a href="cadastrodeprodutos.html">Produtos</a></li>
        <li><a href="orcamento.html">Orçamento</a></li>
        <li><a href="cadastrodeusuarios.html">Usuários</a></li>
        <li><a href="telalogin.html">Sair</a></li>
      </ul>
    </nav>

    <main class="container container--wide">
      <div class="cabecalho-pagina">
        <h1>Categorias</h1>
        <button type="button" id="btnNovaCategoria" class="btn-salvar">
          Nova Categoria
        </button>
      </div>

      <p id="mensagemPrincipal" class="mensagem"></p>

      <div class="barra-pesquisa">
        <div class="barra-pesquisa-wrapper">
          <input
            type="text"
            id="pesquisaCategoria"
            placeholder="Pesquisar por código ou descrição..."
          />
          <button type="button" class="btn-pesquisar-inline" id="btnPesquisarCategoria" title="Pesquisar">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
        <span class="aviso-min-chars" id="avisoCategoria">Digite ao menos 4 caracteres para buscar por descrição.</span>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Descrição</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaCategorias">
            <tr>
              <td colspan="3">Carregando categorias...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- ── Modal: Nova / Editar Categoria ───────────────────────── -->
      <div id="modalCategoria" class="modal-overlay" style="display: none">
        <div class="modal-box">
          <div class="modal-header">
            <h2 id="modalCategoriaTitulo">Nova Categoria</h2>
            <button type="button" id="btnFecharModalCategoria" class="btn-fechar-modal">
              &times;
            </button>
          </div>

          <form id="formCategoria" class="form-categoria">
            <div class="campo">
              <label for="CategoriaId">Código da categoria:</label>
              <input
                type="text"
                id="CategoriaId"
                name="codigo"
                readonly
                placeholder="Gerado automaticamente"
              />
            </div>

            <div class="campo">
              <label for="descCategoria">Descrição:</label>
              <input
                type="text"
                id="descCategoria"
                name="descricao"
                required
                placeholder="Digite a descrição da categoria"
              />
            </div>

            <div class="acoes">
              <button type="button" id="btnCancelarModal" class="btn-limpar">
                Cancelar
              </button>
              <button type="submit" id="btnSalvar" class="btn-salvar">
                Salvar
              </button>
            </div>
          </form>

          <p id="mensagem" class="mensagem"></p>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
      <script src="../JS/auth.js"></script>
      <script src="../JS/categorias.js"></script>
    </main>
  </body>
</html>
