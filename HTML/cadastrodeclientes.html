<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" href="../img/favicon.ico" sizes="any" />
  </head>

  <body>
    <nav class="navbar">
      <ul>
        <li><a href="home.html">Ínicio</a></li>
        <li><a class="ativo" href="cadastrodeclientes.html">Clientes</a></li>
        <li><a href="cadastrodecategorias.html">Categorias</a></li>
        <li><a href="cadastrodeprodutos.html">Produtos</a></li>
        <li><a href="orcamento.html">Orçamento</a></li>
        <li><a href="cadastrodeusuarios.html">Usuários</a></li>
        <li><a href="telalogin.html">Sair</a></li>
      </ul>
    </nav>

    <main class="container container--wide">
      <div class="cabecalho-pagina">
        <h1>Clientes</h1>
        <button type="button" id="btnNovoCliente" class="btn-salvar">
          Novo Cliente
        </button>
      </div>

      <p id="mensagemPrincipal" class="mensagem"></p>

      <div class="barra-pesquisa">
        <div class="barra-pesquisa-wrapper">
          <input
            type="text"
            id="pesquisaCliente"
            placeholder="Pesquisar por nome ou código..."
          />
          <button type="button" class="btn-pesquisar-inline" id="btnPesquisarCliente" title="Pesquisar">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
        <span class="aviso-min-chars" id="avisoCliente">Digite ao menos 4 caracteres para buscar por nome.</span>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Tipo</th>
              <th>CPF / CNPJ</th>
              <th>Nome</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaClientes">
            <tr>
              <td colspan="5">Carregando clientes...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- ── Modal: Novo / Editar Cliente ─────────────────────────── -->
      <div id="modalCliente" class="modal-overlay" style="display: none">
        <div class="modal-box">
          <div class="modal-header">
            <h2 id="modalClienteTitulo">Novo Cliente</h2>
            <button type="button" id="btnFecharModalCliente" class="btn-fechar-modal">
              &times;
            </button>
          </div>

          <form id="formCliente" class="form-cliente">
            <div class="campo">
              <label for="clienteId">Código:</label>
              <input
                type="text"
                id="clienteId"
                name="clienteId"
                readonly
                placeholder="Gerado automaticamente"
              />
            </div>

            <div class="campo">
              <label for="tipoCliente">Tipo de Cliente:</label>
              <select id="tipoCliente" name="tipoCliente" required>
                <option value="">Selecione</option>
                <option value="F">Pessoa Física</option>
                <option value="J">Pessoa Jurídica</option>
              </select>
            </div>

            <div class="campo">
              <label for="nomeCliente">Nome do cliente:</label>
              <input
                type="text"
                id="nomeCliente"
                name="nome"
                required
                placeholder="Digite o nome do cliente"
              />
            </div>

            <div class="campo">
              <label for="cpfCnpjCliente">CPF/CNPJ:</label>
              <input
                type="text"
                id="cpfCnpjCliente"
                name="cpf/cnpj"
                required
                placeholder="Digite o CPF ou CNPJ"
              />
            </div>

            <div class="acoes">
              <button type="button" id="btnCancelarModal" class="btn-limpar">
                Cancelar
              </button>
              <button type="submit" id="btnSalvar" class="btn-salvar">
                Salvar
              </button>
            </div>
          </form>

          <p id="mensagem" class="mensagem"></p>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
      <script src="../JS/auth.js"></script>
      <script src="../JS/clientes.js"></script>
    </main>
  </body>
</html>
