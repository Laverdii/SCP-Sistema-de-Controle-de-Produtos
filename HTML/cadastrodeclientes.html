<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de clientes</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" href="../img/favicon.ico" sizes="any" />
  </head>

  <body>
    <nav class="navbar">
      <ul>
        <li><a href="home.html">Ínicio</a></li>
        <li><a class="ativo" href="cadastrodeclientes.html">Clientes</a></li>
        <li><a href="cadastrodecategorias.html">Categorias</a></li>
        <li><a href="cadastrodeprodutos.html">Produtos</a></li>
        <li><a href="orcamento.html">Orçamento</a></li>
        <li><a href="telalogin.html">Sair</a></li>
      </ul>
    </nav>
    <main class="container">
      <h1>Cadastro de Clientes</h1>
      <form id="formCliente" class="form-cliente">
        <!-- O campo "Código" é gerado automaticamente, por isso é readonly. -->
        <div class="campo">
          <label for="clienteId">Código:</label>
          <input
            type="text"
            id="clienteId"
            name="clienteId"
            readonly
            placeholder="Gerado automaticamente"
          />
        </div>

        <div class="campo">
          <label for="tipoCliente">Tipo de Cliente:</label>
          <select id="tipoCliente" name="tipoCliente" required>
            <option value="">Selecione</option>
            <option value="F">Pessoa Física</option>
            <option value="J">Pessoa Jurídica</option>
          </select>
        </div>

        <div class="campo">
          <label for="nomeCliente">Nome do cliente:</label>
          <input
            type="text"
            id="nomeCliente"
            name="nome"
            required
            placeholder="Digite o nome do cliente"
          />
        </div>

        <div class="campo">
          <label for="cpfCnpjCliente">CPF/CNPJ:</label>
          <input
            type="text"
            id="cpfCnpjCliente"
            name="cpf/cnpj"
            required
            placeholder="Digite o CPF ou CNPJ"
          />
        </div>
        <!-- Botões do formulário -->
        <div class="acoes">
          <button type="reset" class="btn-limpar">Limpar</button>

          <button
            type="button"
            id="btnCancelarEdicao"
            class="btn-cancelar-edicao"
          >
            Cancelar edição
          </button>

          <button type="submit" id="btnSalvar" class="btn-salvar">
            Salvar
          </button>
        </div>
      </form>

      <!-- Aqui aparecerão mensagens como: "Cliente salvo com sucesso" "Erro ao salvar cliente" "Cliente excluído com sucesso" -->
      <p id="mensagem" class="mensagem"></p>
      <h2>Clientes Cadastrados</h2>
      <div class="barra-pesquisa">
        <input
          type="text"
          id="pesquisaCliente"
          placeholder="Pesquisar por nome ou código..."
        />
      </div>

      <!-- Tabela onde os clientes serão exibidos -->
      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Tipo</th>
            <th>CPF / CNPJ</th>
            <th>Nome</th>
            <th>Ações</th>
          </tr>
        </thead>

        <!-- O tbody começa com uma mensagem.
           Depois o JavaScript substitui esse conteúdo pelos dados do Supabase. -->
        <tbody id="tabelaClientes">
          <tr>
            <td colspan="5">Carregando clientes...</td>
          </tr>
        </tbody>
      </table>
    </main>
    <!-- Biblioteca JavaScript do Supabase. Ela precisa ser carregada antes do nosso .js. -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Nosso arquivo JavaScript separado -->
    <script src="../JS/clientes.js"></script>
  </body>
</html>
