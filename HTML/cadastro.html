<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Acesso</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" href="../img/favicon.ico" sizes="any" />
  </head>
  <body class="body-login">
    <main class="container-login">
      <div class="box-login">
        <h1>Cadastro</h1>
        <div id="mensagem" class="mensagem"></div>

        <div class="campo">
          <label for="nomeUsuario">Nome de usuário:</label>
          <input
            type="text"
            id="nomeUsuario"
            placeholder="Insira seu nome de usuário"
          />
        </div>

        <div class="campo">
          <label for="senhaUsuario">Senha:</label>
          <input
            type="password"
            id="senhaUsuario"
            placeholder="Insira sua senha"
          />
        </div>

        <button id="btnCadastrar" class="btn-salvar" disabled>Cadastrar</button>

        <p class="login-cadastro">
          Já tem cadastro?
          <a href="telalogin.html">Voltar para o login</a>
        </p>

        <p class="aviso-cadastro">
          Este cadastro não é o intuito do projeto principal, somente para
          liberar acesso ao sistema.
        </p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../JS/cadastro.js"></script>
  </body>
</html>
